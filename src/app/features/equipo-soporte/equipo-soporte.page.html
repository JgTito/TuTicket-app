<main class="bg-slate-100 text-slate-950">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-7xl flex-col gap-4 px-6 py-5 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <h1 class="text-2xl font-semibold text-slate-950">Equipos de soporte</h1>
        <p class="mt-1 text-sm text-slate-600">Crea equipos y administra sus integrantes en una sola vista.</p>
      </div>

      <button
        class="h-11 rounded-lg bg-teal-600 px-5 text-sm font-semibold text-white shadow-sm transition hover:bg-teal-700 disabled:cursor-not-allowed disabled:bg-slate-300"
        type="button"
        [disabled]="saving()"
        (click)="openCreateEquipoModal()"
      >
        Nuevo equipo
      </button>
    </div>
  </header>

  <section class="mx-auto max-w-7xl px-6 py-8">
    @if (errorMessage()) {
      <div class="mb-5 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        {{ errorMessage() }}
      </div>
    }

    <div class="grid gap-6 lg:grid-cols-[420px_1fr]">
      <app-equipo-soporte-list
        [equipos]="equipos()"
        [selectedEquipoId]="selectedEquipo()?.idEquipoSoporte ?? null"
        [loading]="loadingEquipos()"
        [saving]="saving()"
        [incluirInactivos]="incluirEquiposInactivos()"
        [pagina]="equiposPagina()"
        [tamanoPagina]="equiposTamanoPagina()"
        [totalRegistros]="equiposTotalRegistros()"
        [totalPaginas]="equiposTotalPaginas()"
        (selectEquipo)="selectEquipo($event)"
        (edit)="openEditEquipoModal($event)"
        (delete)="openDeleteEquipoModal($event)"
        (toggleInactivos)="toggleEquiposInactivos()"
        (pageChange)="changeEquiposPage($event)"
        (pageSizeChange)="changeEquiposPageSize($event)"
      />

      <div class="space-y-6">
        <app-equipo-soporte-categoria-list
          [equipo]="selectedEquipo()"
          [categoriasEquipo]="categoriasEquipo()"
          [loading]="loadingCategoriasEquipo()"
          [saving]="saving()"
          [categoriasLoading]="loadingCategorias()"
          [incluirInactivos]="incluirCategoriasEquipoInactivas()"
          [pagina]="categoriasEquipoPagina()"
          [tamanoPagina]="categoriasEquipoTamanoPagina()"
          [totalRegistros]="categoriasEquipoTotalRegistros()"
          [totalPaginas]="categoriasEquipoTotalPaginas()"
          (add)="openCreateCategoriaEquipoModal()"
          (edit)="openEditCategoriaEquipoModal($event)"
          (delete)="openDeleteCategoriaEquipoModal($event)"
          (toggleInactivos)="toggleCategoriasEquipoInactivas()"
          (pageChange)="changeCategoriasEquipoPage($event)"
          (pageSizeChange)="changeCategoriasEquipoPageSize($event)"
        />

        <app-equipo-soporte-usuario-list
          [equipo]="selectedEquipo()"
          [integrantes]="integrantes()"
          [loading]="loadingIntegrantes()"
          [saving]="saving()"
          [usuariosLoading]="loadingUsuarios()"
          [incluirInactivos]="incluirIntegrantesInactivos()"
          [pagina]="integrantesPagina()"
          [tamanoPagina]="integrantesTamanoPagina()"
          [totalRegistros]="integrantesTotalRegistros()"
          [totalPaginas]="integrantesTotalPaginas()"
          (add)="openCreateIntegranteModal()"
          (edit)="openEditIntegranteModal($event)"
          (delete)="openDeleteIntegranteModal($event)"
          (toggleInactivos)="toggleIntegrantesInactivos()"
          (pageChange)="changeIntegrantesPage($event)"
          (pageSizeChange)="changeIntegrantesPageSize($event)"
        />
      </div>
    </div>
  </section>
</main>
