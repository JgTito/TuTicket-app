<div class="bg-white text-slate-950">
  <div class="border-b border-slate-200 px-6 py-5">
    <h2 class="text-xl font-semibold">Adjuntar archivo</h2>
    <p class="mt-1 text-sm text-slate-500">Ticket: {{ data.codigoTicket }}</p>
  </div>

  <div class="space-y-5 px-6 py-5">
    <label class="block">
      <span class="text-sm font-medium text-slate-700">Archivo</span>
      <input
        class="mt-2 block w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-950 outline-none file:mr-4 file:rounded-lg file:border-0 file:bg-teal-50 file:px-4 file:py-2 file:text-sm file:font-semibold file:text-teal-700 focus:border-teal-500 focus:ring-4 focus:ring-teal-100"
        type="file"
        multiple
        (change)="selectFiles($event)"
      />
    </label>

    @if (selectedFiles().length > 0) {
      <div class="space-y-2 rounded-lg border border-slate-200 bg-slate-50 px-4 py-3">
        <p class="text-sm font-semibold text-slate-950">{{ selectedFiles().length }} archivo(s) seleccionado(s)</p>
        @for (file of selectedFiles(); track file.name + file.size) {
          <p class="text-sm text-slate-500">{{ file.name }} · {{ file.size }} bytes</p>
        }
      </div>
    }

    @if (errorMessage()) {
      <div class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">{{ errorMessage() }}</div>
    }

    <div class="flex justify-end gap-3 border-t border-slate-200 pt-5">
      <button class="h-10 rounded-lg border border-slate-300 px-4 text-sm font-semibold text-slate-700 transition hover:bg-slate-50" type="button" (click)="close()">Cancelar</button>
      <button class="h-10 rounded-lg bg-teal-600 px-4 text-sm font-semibold text-white transition hover:bg-teal-700" type="button" (click)="submit()">Adjuntar</button>
    </div>
  </div>
</div>
