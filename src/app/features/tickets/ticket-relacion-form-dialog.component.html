<div class="bg-white text-slate-950">
  <div class="border-b border-slate-200 px-6 py-5">
    <h2 class="text-xl font-semibold">Relacionar ticket</h2>
    <p class="mt-1 text-sm text-slate-500">Selecciona el ticket y el tipo de relacion para {{ data.codigoTicket }}.</p>
  </div>

  <form class="space-y-5 px-6 py-5" [formGroup]="form" (ngSubmit)="submit()">
    @if (backendErrors().length > 0) {
      <div class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        @for (message of backendErrors(); track message) {
          <p>{{ message }}</p>
        }
      </div>
    }

    <label class="relative block">
      <span class="text-sm font-medium text-slate-700">Ticket relacionado</span>
      <input
        class="mt-2 h-11 w-full rounded-lg border border-slate-300 bg-white px-3 text-sm text-slate-950 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-100"
        type="search"
        formControlName="ticketRelacionadoTexto"
        placeholder="Buscar por codigo, titulo o descripcion"
        [disabled]="loadingTickets()"
        autocomplete="off"
        (focus)="openTicketOptions()"
        (input)="searchTickets()"
        (blur)="closeTicketOptions()"
        (keydown.enter)="$event.preventDefault()"
      />
      @if (ticketOptionsOpen()) {
        <div class="absolute z-30 mt-2 max-h-64 w-full overflow-y-auto rounded-lg border border-slate-200 bg-white py-1 shadow-lg">
          @if (loadingTickets()) {
            <p class="px-3 py-2 text-sm text-slate-500">Buscando...</p>
          } @else {
            @for (ticket of tickets(); track ticket.idTicket) {
              <button
                class="w-full px-3 py-2 text-left text-sm transition hover:bg-teal-50"
                type="button"
                (mousedown)="$event.preventDefault(); selectTicket(ticket)"
              >
                <span class="block font-semibold text-slate-950">{{ ticket.codigo }} - {{ ticket.titulo }}</span>
                <span class="mt-0.5 block text-xs text-slate-500">{{ ticket.nombreEstadoTicket }}</span>
              </button>
            } @empty {
              <p class="px-3 py-2 text-sm text-slate-500">No hay tickets para ese texto.</p>
            }
          }
        </div>
      }
      @if (form.controls.idTicketRelacionado.touched && form.controls.idTicketRelacionado.invalid) {
        <span class="mt-2 block text-sm text-red-600">Selecciona un ticket relacionado.</span>
      }
    </label>

    <label class="block">
      <span class="text-sm font-medium text-slate-700">Tipo de relacion</span>
      <select
        class="mt-2 h-11 w-full rounded-lg border border-slate-300 bg-white px-3 text-sm text-slate-950 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-100"
        formControlName="idTipoRelacionTicket"
      >
        <option [value]="0">Selecciona un tipo</option>
        @for (tipo of data.tiposRelacion; track tipo.idTipoRelacionTicket) {
          <option [value]="tipo.idTipoRelacionTicket">{{ tipo.nombre }}</option>
        }
      </select>
      @if (data.tiposRelacion.length === 0) {
        <span class="mt-2 block text-sm text-amber-700">No hay tipos de relacion activos configurados.</span>
      }
      @if (form.controls.idTipoRelacionTicket.touched && form.controls.idTipoRelacionTicket.invalid) {
        <span class="mt-2 block text-sm text-red-600">Selecciona un tipo de relacion.</span>
      }
    </label>

    <label class="block">
      <span class="text-sm font-medium text-slate-700">Observacion</span>
      <textarea
        class="mt-2 min-h-28 w-full resize-y rounded-lg border border-slate-300 bg-white px-3 py-3 text-sm text-slate-950 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-100"
        maxlength="500"
        formControlName="observacion"
        placeholder="Opcional"
      ></textarea>
      @if (form.controls.observacion.touched && form.controls.observacion.invalid) {
        <span class="mt-2 block text-sm text-red-600">La observacion no puede superar 500 caracteres.</span>
      }
    </label>

    <div class="flex justify-end gap-3 border-t border-slate-200 pt-5">
      <button class="h-10 rounded-lg border border-slate-300 px-4 text-sm font-semibold text-slate-700 transition hover:bg-slate-50" type="button" (click)="close()">Cancelar</button>
      <button class="h-10 rounded-lg bg-teal-600 px-4 text-sm font-semibold text-white transition hover:bg-teal-700 disabled:cursor-not-allowed disabled:bg-slate-300" type="submit" [disabled]="loadingTickets()">
        Relacionar
      </button>
    </div>
  </form>
</div>
