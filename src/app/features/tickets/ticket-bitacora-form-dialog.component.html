<div class="bg-white text-slate-950">
  <div class="border-b border-slate-200 px-6 py-5">
    <h2 class="text-xl font-semibold">Agregar bitacora</h2>
    <p class="mt-1 text-sm text-slate-500">Ticket: {{ data.codigoTicket }}</p>
  </div>

  <form class="space-y-5 px-6 py-5" [formGroup]="form" (ngSubmit)="submit()">
    <label class="block">
      <span class="text-sm font-medium text-slate-700">Comentario</span>
      <textarea
        class="mt-2 min-h-32 w-full resize-y rounded-lg border border-slate-300 bg-white px-3 py-3 text-sm text-slate-950 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-100"
        formControlName="comentario"
      ></textarea>
      @if (form.controls.comentario.touched && form.controls.comentario.invalid) {
        <span class="mt-2 block text-sm text-red-600">El comentario es obligatorio y debe tener maximo 1000 caracteres.</span>
      }
    </label>

    <label class="flex items-center gap-3 rounded-lg border border-slate-200 px-3 py-2.5 text-sm font-medium text-slate-700">
      <input class="h-4 w-4 rounded border-slate-300 text-teal-600 focus:ring-teal-500" type="checkbox" formControlName="esInterno" />
      Comentario interno
    </label>

    <div class="flex justify-end gap-3 border-t border-slate-200 pt-5">
      <button class="h-10 rounded-lg border border-slate-300 px-4 text-sm font-semibold text-slate-700 transition hover:bg-slate-50" type="button" (click)="close()">Cancelar</button>
      <button class="h-10 rounded-lg bg-teal-600 px-4 text-sm font-semibold text-white transition hover:bg-teal-700" type="submit">Guardar</button>
    </div>
  </form>
</div>
