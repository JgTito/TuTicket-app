<div class="bg-white text-slate-950">
  <div class="border-b border-slate-200 px-6 py-5">
    <h2 class="text-xl font-semibold">Cambiar estado</h2>
    <p class="mt-1 text-sm text-slate-500">{{ data.codigoTicket }} · Estado actual: {{ data.estadoActual }}</p>
  </div>

  <form class="space-y-5 px-6 py-5" [formGroup]="form" (ngSubmit)="submit()">
    @if (backendErrors().length > 0) {
      <div class="rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        @for (message of backendErrors(); track message) {
          <p>{{ message }}</p>
        }
      </div>
    }

    <label class="block">
      <span class="text-sm font-medium text-slate-700">Nuevo estado</span>
      <select
        class="mt-2 h-11 w-full rounded-lg border border-slate-300 bg-white px-3 text-sm text-slate-950 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-100"
        formControlName="idEstadoTicket"
        [disabled]="saving()"
      >
        <option [value]="0">Selecciona un estado</option>
        @for (estado of data.estados; track estado.idEstadoTicket) {
          <option [value]="estado.idEstadoTicket">
            {{ estado.nombre }}{{ estado.requiereComentario ? ' - requiere comentario' : '' }}
          </option>
        }
      </select>
      @if (form.controls.idEstadoTicket.touched && form.controls.idEstadoTicket.invalid) {
        <span class="mt-2 block text-sm text-red-600">Selecciona un estado disponible.</span>
      }
    </label>

    @if (selectedEstado()?.descripcion) {
      <div class="rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-600">
        {{ selectedEstado()?.descripcion }}
      </div>
    }

    <label class="block">
      <span class="text-sm font-medium text-slate-700">Comentario{{ requiereComentario() ? ' obligatorio' : '' }}</span>
      <textarea
        class="mt-2 min-h-28 w-full resize-y rounded-lg border border-slate-300 bg-white px-3 py-3 text-sm text-slate-950 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-100"
        formControlName="comentario"
        [disabled]="saving()"
      ></textarea>
      @if (form.controls.comentario.touched && form.controls.comentario.invalid) {
        <span class="mt-2 block text-sm text-red-600">El comentario es obligatorio para este cambio o supera 500 caracteres.</span>
      }
    </label>

    <div class="flex justify-end gap-3 border-t border-slate-200 pt-5">
      <button class="h-10 rounded-lg border border-slate-300 px-4 text-sm font-semibold text-slate-700 transition hover:bg-slate-50 disabled:cursor-not-allowed disabled:text-slate-400" type="button" [disabled]="saving()" (click)="close()">Cancelar</button>
      <button class="h-10 rounded-lg bg-teal-600 px-4 text-sm font-semibold text-white transition hover:bg-teal-700 disabled:cursor-not-allowed disabled:bg-slate-300" type="submit" [disabled]="saving()">
        {{ saving() ? 'Guardando...' : 'Cambiar estado' }}
      </button>
    </div>
  </form>
</div>
