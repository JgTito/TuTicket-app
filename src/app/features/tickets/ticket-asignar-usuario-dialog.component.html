<div class="bg-white text-slate-950">
  <div class="border-b border-slate-200 px-6 py-5">
    <h2 class="text-xl font-semibold">Asignar usuario</h2>
    <p class="mt-1 text-sm text-slate-500">Selecciona el responsable para el ticket {{ data.codigoTicket }}.</p>
  </div>

  <form class="space-y-5 px-6 py-5" [formGroup]="form" (ngSubmit)="submit()">
    <label class="block">
      <span class="text-sm font-medium text-slate-700">Usuario asignado</span>
      <select
        class="mt-2 h-11 w-full rounded-lg border border-slate-300 bg-white px-3 text-sm text-slate-950 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-100"
        formControlName="idUsuarioAsignado"
      >
        <option value="">Selecciona</option>
        @for (usuario of data.usuarios; track usuario.id) {
          <option [value]="usuario.id">
            {{ usuario.nombreCompleto }}{{ usuario.email ? ' - ' + usuario.email : '' }}
          </option>
        }
      </select>
      @if (form.controls.idUsuarioAsignado.touched && form.controls.idUsuarioAsignado.invalid) {
        <span class="mt-2 block text-sm text-red-600">Selecciona un usuario.</span>
      }
    </label>

    <label class="block">
      <span class="text-sm font-medium text-slate-700">Comentario</span>
      <textarea
        class="mt-2 min-h-28 w-full resize-y rounded-lg border border-slate-300 bg-white px-3 py-3 text-sm text-slate-950 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-100"
        maxlength="500"
        formControlName="comentario"
        placeholder="Opcional"
      ></textarea>
      @if (form.controls.comentario.touched && form.controls.comentario.invalid) {
        <span class="mt-2 block text-sm text-red-600">El comentario no puede superar 500 caracteres.</span>
      }
    </label>

    <div class="flex justify-end gap-3 border-t border-slate-200 pt-5">
      <button class="h-10 rounded-lg border border-slate-300 px-4 text-sm font-semibold text-slate-700 transition hover:bg-slate-50" type="button" (click)="close()">Cancelar</button>
      <button class="h-10 rounded-lg bg-teal-600 px-4 text-sm font-semibold text-white transition hover:bg-teal-700" type="submit">Asignar</button>
    </div>
  </form>
</div>
