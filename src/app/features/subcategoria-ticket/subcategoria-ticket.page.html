<main class="bg-slate-100 text-slate-950">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-7xl flex-col gap-4 px-6 py-5 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <h1 class="text-2xl font-semibold text-slate-950">Subcategorias de ticket</h1>
        <p class="mt-1 text-sm text-slate-600">Administra clasificaciones secundarias asociadas a categorias.</p>
      </div>

      <button
        class="h-11 rounded-lg bg-teal-600 px-5 text-sm font-semibold text-white shadow-sm transition hover:bg-teal-700 disabled:cursor-not-allowed disabled:bg-slate-300"
        type="button"
        [disabled]="saving() || loadingCategorias() || categorias().length === 0"
        (click)="openCreateModal()"
      >
        Nueva subcategoria
      </button>
    </div>
  </header>

  <section class="mx-auto max-w-7xl px-6 py-8">
    <div class="mb-5 grid gap-4 lg:grid-cols-[1fr_auto_auto] lg:items-end">
      <div>
        <p class="text-sm font-medium text-slate-700">Listado</p>
        <p class="text-sm text-slate-500">{{ totalRegistros() }} subcategorias registradas</p>
      </div>

      <label class="block min-w-72">
        <span class="text-sm font-medium text-slate-700">Filtrar por categoria</span>
        <select
          class="mt-2 h-11 w-full rounded-lg border border-slate-300 bg-white px-3 text-sm text-slate-950 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-100"
          [value]="selectedCategoriaId() ?? ''"
          [disabled]="loadingCategorias()"
          (change)="changeCategoriaFilter($any($event.target).value ? +$any($event.target).value : null)"
        >
          <option value="">Todas las categorias</option>
          @for (categoria of categorias(); track categoria.idCategoriaTicket) {
            <option [value]="categoria.idCategoriaTicket">{{ categoria.nombre }}</option>
          }
        </select>
      </label>

      <label class="inline-flex cursor-pointer items-center gap-3 rounded-lg border border-slate-200 bg-white px-4 py-3 text-sm font-medium text-slate-700 shadow-sm">
        <input
          class="h-4 w-4 rounded border-slate-300 text-teal-600 focus:ring-teal-500"
          type="checkbox"
          [checked]="incluirInactivos()"
          (change)="toggleInactivos()"
        />
        Incluir inactivas
      </label>
    </div>

    @if (errorMessage()) {
      <div class="mb-5 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        {{ errorMessage() }}
      </div>
    }

    <app-subcategoria-ticket-list
      [subcategorias]="subcategorias()"
      [loading]="loading()"
      [saving]="saving()"
      [pagina]="pagina()"
      [tamanoPagina]="tamanoPagina()"
      [totalRegistros]="totalRegistros()"
      [totalPaginas]="totalPaginas()"
      (edit)="openEditModal($event)"
      (delete)="openDeleteModal($event)"
      (pageChange)="changePage($event)"
      (pageSizeChange)="changePageSize($event)"
    />
  </section>
</main>
