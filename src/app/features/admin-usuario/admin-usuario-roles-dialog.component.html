<div class="bg-white text-slate-950">
  <div class="border-b border-slate-200 px-6 py-5">
    <h2 class="text-xl font-semibold">Roles del usuario</h2>
    <p class="mt-1 text-sm text-slate-500">{{ data.usuario.nombreCompleto }}</p>
  </div>

  <div class="space-y-5 px-6 py-5">
    <div class="grid gap-2 sm:grid-cols-2">
      @for (role of data.roles; track role.id) {
        <label class="flex items-center gap-3 rounded-lg border border-slate-200 px-3 py-2.5 text-sm text-slate-700">
          <input
            class="h-4 w-4 rounded border-slate-300 text-teal-600 focus:ring-teal-500 disabled:cursor-not-allowed"
            type="checkbox"
            [checked]="roleSelected(role.nombre)"
            [disabled]="isOwnUser() && role.nombre === 'Administrador' && roleSelected(role.nombre)"
            (change)="toggleRole(role.nombre)"
          />
          {{ role.nombre }}
        </label>
      }
    </div>

    @if (touched() && selectedRoles().length === 0) {
      <span class="block text-sm text-red-600">Selecciona al menos un rol.</span>
    }

    @if (isOwnUser()) {
      <div class="rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-800">
        No puedes quitarte el rol Administrador desde tu propia cuenta.
      </div>
    }
  </div>

  <div class="flex justify-end gap-3 border-t border-slate-200 px-6 py-4">
    <button class="h-10 rounded-lg border border-slate-300 px-4 text-sm font-semibold text-slate-700 transition hover:bg-slate-50" type="button" (click)="close()">Cancelar</button>
    <button class="h-10 rounded-lg bg-teal-600 px-4 text-sm font-semibold text-white transition hover:bg-teal-700" type="button" (click)="submit()">Guardar roles</button>
  </div>
</div>
