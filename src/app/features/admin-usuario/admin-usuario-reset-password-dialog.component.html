<div class="bg-white text-slate-950">
  <div class="border-b border-slate-200 px-6 py-5">
    <h2 class="text-xl font-semibold">Resetear password</h2>
    <p class="mt-1 text-sm text-slate-500">{{ data.usuario.nombreCompleto }}</p>
  </div>

  <form class="space-y-5 px-6 py-5" [formGroup]="form" (ngSubmit)="submit()">
    <label class="block">
      <span class="text-sm font-medium text-slate-700">Nuevo password</span>
      <input
        class="mt-2 h-11 w-full rounded-lg border border-slate-300 bg-white px-3 text-sm text-slate-950 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-100"
        type="password"
        formControlName="nuevaPassword"
      />
      @if (form.controls.nuevaPassword.touched && form.controls.nuevaPassword.invalid) {
        <span class="mt-2 block text-sm text-red-600">Debe tener al menos 6 caracteres.</span>
      }
    </label>

    <label class="block">
      <span class="text-sm font-medium text-slate-700">Confirmar password</span>
      <input
        class="mt-2 h-11 w-full rounded-lg border border-slate-300 bg-white px-3 text-sm text-slate-950 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-100"
        type="password"
        formControlName="confirmarPassword"
      />
      @if (form.controls.confirmarPassword.touched && !passwordsMatch()) {
        <span class="mt-2 block text-sm text-red-600">Los passwords no coinciden.</span>
      }
    </label>

    <div class="flex justify-end gap-3 border-t border-slate-200 pt-5">
      <button class="h-10 rounded-lg border border-slate-300 px-4 text-sm font-semibold text-slate-700 transition hover:bg-slate-50" type="button" (click)="close()">Cancelar</button>
      <button class="h-10 rounded-lg bg-teal-600 px-4 text-sm font-semibold text-white transition hover:bg-teal-700" type="submit">Resetear</button>
    </div>
  </form>
</div>
