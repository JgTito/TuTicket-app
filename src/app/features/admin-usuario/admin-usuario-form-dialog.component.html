<div class="bg-white text-slate-950">
  <div class="border-b border-slate-200 px-6 py-5">
    <h2 class="text-xl font-semibold">{{ title }}</h2>
    <p class="mt-1 text-sm text-slate-500">Administra datos base, estado y roles de acceso.</p>
  </div>

  <form class="space-y-5 px-6 py-5" [formGroup]="form" (ngSubmit)="submit()">
    <label class="block">
      <span class="text-sm font-medium text-slate-700">Nombre completo</span>
      <input
        class="mt-2 h-11 w-full rounded-lg border border-slate-300 bg-white px-3 text-sm text-slate-950 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-100"
        type="text"
        maxlength="150"
        formControlName="nombreCompleto"
      />
      @if (form.controls.nombreCompleto.touched && form.controls.nombreCompleto.invalid) {
        <span class="mt-2 block text-sm text-red-600">El nombre es obligatorio y no puede superar 150 caracteres.</span>
      }
    </label>

    <label class="block">
      <span class="text-sm font-medium text-slate-700">Email</span>
      <input
        class="mt-2 h-11 w-full rounded-lg border border-slate-300 bg-white px-3 text-sm text-slate-950 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-100"
        type="email"
        maxlength="256"
        formControlName="email"
      />
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <span class="mt-2 block text-sm text-red-600">Ingresa un email valido.</span>
      }
    </label>

    @if (data.mode === 'create') {
      <label class="block">
        <span class="text-sm font-medium text-slate-700">Password inicial</span>
        <input
          class="mt-2 h-11 w-full rounded-lg border border-slate-300 bg-white px-3 text-sm text-slate-950 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-100"
          type="password"
          formControlName="password"
        />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <span class="mt-2 block text-sm text-red-600">El password es obligatorio y debe tener al menos 6 caracteres.</span>
        }
      </label>
    }

    <label class="flex items-center gap-3 rounded-lg border border-slate-200 px-3 py-2.5 text-sm font-medium text-slate-700">
      <input class="h-4 w-4 rounded border-slate-300 text-teal-600 focus:ring-teal-500" type="checkbox" formControlName="activo" />
      Cuenta activa
    </label>

    @if (data.mode === 'create') {
      <div>
        <p class="text-sm font-medium text-slate-700">Roles</p>
        <div class="mt-2 grid gap-2 sm:grid-cols-2">
          @for (role of data.roles; track role.id) {
            <label class="flex items-center gap-3 rounded-lg border border-slate-200 px-3 py-2.5 text-sm text-slate-700">
              <input
                class="h-4 w-4 rounded border-slate-300 text-teal-600 focus:ring-teal-500"
                type="checkbox"
                [checked]="roleSelected(role.nombre)"
                (change)="toggleRole(role.nombre)"
              />
              {{ role.nombre }}
            </label>
          }
        </div>
        @if (rolesTouched() && selectedRoles().length === 0) {
          <span class="mt-2 block text-sm text-red-600">Selecciona al menos un rol.</span>
        }
      </div>
    }

    <div class="flex justify-end gap-3 border-t border-slate-200 pt-5">
      <button class="h-10 rounded-lg border border-slate-300 px-4 text-sm font-semibold text-slate-700 transition hover:bg-slate-50" type="button" (click)="close()">Cancelar</button>
      <button class="h-10 rounded-lg bg-teal-600 px-4 text-sm font-semibold text-white transition hover:bg-teal-700" type="submit">{{ submitText }}</button>
    </div>
  </form>
</div>
