<main class="bg-slate-100 text-slate-950">
  <section class="mx-auto max-w-7xl px-6 py-8">
    <div class="rounded-lg border border-slate-200 bg-white p-8 shadow-sm">
      <p class="text-sm font-medium text-teal-700">Sesion iniciada</p>
      <h1 class="mt-2 text-3xl font-semibold text-slate-950">{{ authService.currentUser()?.nombreCompleto }}</h1>
      <p class="mt-3 text-slate-600">{{ authService.currentUser()?.email }}</p>

      <div class="mt-7 flex flex-wrap gap-2">
        @for (role of authService.currentUser()?.roles ?? []; track role) {
          <span class="rounded-full bg-teal-50 px-3 py-1 text-sm font-medium text-teal-700">{{ role }}</span>
        }
      </div>
    </div>
  </section>
</main>
