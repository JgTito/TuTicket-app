<div class="bg-white text-slate-950">
  <div class="border-b border-slate-200 px-6 py-5">
    <h2 class="text-xl font-semibold">{{ title }}</h2>
    <p class="mt-1 text-sm text-slate-500">Define cómo aparecerá este estado dentro del flujo de tickets.</p>
  </div>

  <form class="space-y-5 px-6 py-5" [formGroup]="form" (ngSubmit)="submit()">
    <label class="block">
      <span class="text-sm font-medium text-slate-700">Nombre</span>
      <input
        class="mt-2 h-11 w-full rounded-lg border border-slate-300 bg-white px-3 text-sm text-slate-950 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-100"
        type="text"
        formControlName="nombre"
        placeholder="Ej: En progreso"
      />
      @if (form.controls.nombre.touched && form.controls.nombre.invalid) {
        <span class="mt-2 block text-sm text-red-600">El nombre es obligatorio y debe tener máximo 100 caracteres.</span>
      }
    </label>

    <label class="block">
      <span class="text-sm font-medium text-slate-700">Descripción</span>
      <textarea
        class="mt-2 min-h-24 w-full resize-y rounded-lg border border-slate-300 bg-white px-3 py-3 text-sm text-slate-950 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-100"
        formControlName="descripcion"
        placeholder="Detalle breve del uso de este estado"
      ></textarea>
      @if (form.controls.descripcion.touched && form.controls.descripcion.invalid) {
        <span class="mt-2 block text-sm text-red-600">La descripción debe tener máximo 300 caracteres.</span>
      }
    </label>

    <div class="grid gap-4 sm:grid-cols-2">
      <label class="block">
        <span class="text-sm font-medium text-slate-700">Orden</span>
        <input
          class="mt-2 h-11 w-full rounded-lg border border-slate-300 bg-white px-3 text-sm text-slate-950 outline-none transition focus:border-teal-500 focus:ring-4 focus:ring-teal-100"
          type="number"
          min="1"
          formControlName="orden"
        />
        @if (form.controls.orden.touched && form.controls.orden.invalid) {
          <span class="mt-2 block text-sm text-red-600">El orden debe ser mayor o igual a 1.</span>
        }
      </label>

      <div class="space-y-3 pt-7">
        <label class="flex items-center gap-3 rounded-lg border border-slate-200 px-3 py-2.5 text-sm font-medium text-slate-700">
          <input class="h-4 w-4 rounded border-slate-300 text-teal-600 focus:ring-teal-500" type="checkbox" formControlName="esEstadoFinal" />
          Estado final
        </label>

        <label class="flex items-center gap-3 rounded-lg border border-slate-200 px-3 py-2.5 text-sm font-medium text-slate-700">
          <input class="h-4 w-4 rounded border-slate-300 text-teal-600 focus:ring-teal-500" type="checkbox" formControlName="activo" />
          Activo
        </label>
      </div>
    </div>

    <div class="flex justify-end gap-3 border-t border-slate-200 pt-5">
      <button
        class="h-10 rounded-lg border border-slate-300 px-4 text-sm font-semibold text-slate-700 transition hover:bg-slate-50"
        type="button"
        (click)="close()"
      >
        Cancelar
      </button>
      <button
        class="h-10 rounded-lg bg-teal-600 px-4 text-sm font-semibold text-white transition hover:bg-teal-700"
        type="submit"
      >
        {{ submitText }}
      </button>
    </div>
  </form>
</div>
