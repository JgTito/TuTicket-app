<div class="bg-white text-slate-950">
  <div class="border-b border-slate-200 px-6 py-5"><h2 class="text-xl font-semibold">{{ title }}</h2><p class="mt-1 text-sm text-slate-500">Define una politica general para agrupar reglas SLA.</p></div>
  <form class="space-y-5 px-6 py-5" [formGroup]="form" (ngSubmit)="submit()">
    <label class="block"><span class="text-sm font-medium text-slate-700">Nombre</span><input class="mt-2 h-11 w-full rounded-lg border border-slate-300 px-3 text-sm outline-none focus:border-teal-500 focus:ring-4 focus:ring-teal-100" formControlName="nombre" placeholder="Ej: SLA estandar" />@if (form.controls.nombre.touched && form.controls.nombre.invalid) { <span class="mt-2 block text-sm text-red-600">Nombre obligatorio, maximo 150 caracteres.</span> }</label>
    <label class="block"><span class="text-sm font-medium text-slate-700">Descripcion</span><textarea class="mt-2 min-h-24 w-full rounded-lg border border-slate-300 px-3 py-3 text-sm outline-none focus:border-teal-500 focus:ring-4 focus:ring-teal-100" formControlName="descripcion"></textarea>@if (form.controls.descripcion.touched && form.controls.descripcion.invalid) { <span class="mt-2 block text-sm text-red-600">Maximo 300 caracteres.</span> }</label>
    <label class="flex items-center gap-3 rounded-lg border border-slate-200 px-3 py-2.5 text-sm font-medium text-slate-700"><input class="h-4 w-4 rounded border-slate-300 text-teal-600" type="checkbox" formControlName="activo" />Activa</label>
    <div class="flex justify-end gap-3 border-t border-slate-200 pt-5"><button class="h-10 rounded-lg border border-slate-300 px-4 text-sm font-semibold" type="button" (click)="close()">Cancelar</button><button class="h-10 rounded-lg bg-teal-600 px-4 text-sm font-semibold text-white" type="submit">{{ submitText }}</button></div>
  </form>
</div>
