<main class="bg-slate-100 text-slate-950">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-7xl flex-col gap-4 px-6 py-5 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <h1 class="text-2xl font-semibold text-slate-950">Politicas SLA</h1>
        <p class="mt-1 text-sm text-slate-600">Administra politicas y sus reglas de respuesta y resolucion.</p>
      </div>
      <button class="h-11 rounded-lg bg-teal-600 px-5 text-sm font-semibold text-white" type="button" [disabled]="saving()" (click)="openCreatePoliticaModal()">Nueva politica</button>
    </div>
  </header>

  <section class="mx-auto max-w-7xl px-6 py-8">
    @if (errorMessage()) {
      <div class="mb-5 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">{{ errorMessage() }}</div>
    }
    <div class="grid gap-6 lg:grid-cols-[420px_1fr]">
      <app-sla-politica-list
        [politicas]="politicas()"
        [selectedPoliticaId]="selectedPolitica()?.idSlaPolitica ?? null"
        [loading]="loadingPoliticas()"
        [saving]="saving()"
        [incluirInactivos]="incluirPoliticasInactivas()"
        [pagina]="politicasPagina()"
        [tamanoPagina]="politicasTamanoPagina()"
        [totalRegistros]="politicasTotalRegistros()"
        [totalPaginas]="politicasTotalPaginas()"
        (selectPolitica)="selectPolitica($event)"
        (edit)="openEditPoliticaModal($event)"
        (delete)="openDeletePoliticaModal($event)"
        (toggleInactivos)="togglePoliticasInactivas()"
        (pageChange)="changePoliticasPage($event)"
        (pageSizeChange)="changePoliticasPageSize($event)"
      />
      <app-sla-regla-list
        [politica]="selectedPolitica()"
        [reglas]="reglas()"
        [loading]="loadingReglas()"
        [saving]="saving()"
        [incluirInactivos]="incluirReglasInactivas()"
        [pagina]="reglasPagina()"
        [tamanoPagina]="reglasTamanoPagina()"
        [totalRegistros]="reglasTotalRegistros()"
        [totalPaginas]="reglasTotalPaginas()"
        (add)="openCreateReglaModal()"
        (edit)="openEditReglaModal($event)"
        (delete)="openDeleteReglaModal($event)"
        (toggleInactivos)="toggleReglasInactivas()"
        (pageChange)="changeReglasPage($event)"
        (pageSizeChange)="changeReglasPageSize($event)"
      />
    </div>
  </section>
</main>
