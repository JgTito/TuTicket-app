<div class="bg-white text-slate-950">
  <div class="px-6 py-5">
    <h2 class="text-xl font-semibold">{{ data.title }}</h2>
    <p class="mt-3 text-sm leading-6 text-slate-600">{{ data.message }}</p>
  </div>

  <div class="flex justify-end gap-3 border-t border-slate-200 px-6 py-4">
    <button
      class="h-10 rounded-lg border border-slate-300 px-4 text-sm font-semibold text-slate-700 transition hover:bg-slate-50"
      type="button"
      (click)="close(false)"
    >
      {{ data.cancelText }}
    </button>
    <button
      class="h-10 rounded-lg bg-red-600 px-4 text-sm font-semibold text-white transition hover:bg-red-700"
      type="button"
      (click)="close(true)"
    >
      {{ data.confirmText }}
    </button>
  </div>
</div>
